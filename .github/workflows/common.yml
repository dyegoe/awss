name: Common
on:
  pull_request:
    branches:
      - main
jobs:
  check-pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout commit
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Run fmt
        run: go fmt ./...

      - name: Run vet
        run: go vet ./...

      - name: Run mod tidy
        run: go mod tidy -v

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - name: Run test
        run: go test -timeout 30s -short $(go list ./...)

      - name: Smoke test version injection
        run: |
          go build -ldflags="-X github.com/dyegoe/awss/cmd.version=ci-test" -o awss .
          ./awss --version | grep -q "ci-test"
